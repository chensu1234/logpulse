<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>logpulse – Live Log Dashboard</title>
  <style>
    /* ── Reset & Base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --accent:    #58a6ff;
      --green:     #3fb950;
      --yellow:    #d29922;
      --red:       #f85149;
      --purple:    #bc8cff;
      --font:      'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      --fs:        13px;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font: var(--fs) var(--font); }
    body { display: flex; flex-direction: column; }

    /* ── Header ──────────────────────────────────────────────────── */
    header {
      display: flex; align-items: center; gap: 16px;
      padding: 10px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    header .logo { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
    header .logo span { color: var(--muted); font-weight: 400; }
    .header-stats { display: flex; gap: 20px; margin-left: auto; font-size: 12px; }
    .stat { display: flex; flex-direction: column; align-items: center; }
    .stat-val { font-size: 16px; font-weight: 700; color: var(--green); }
    .stat-lbl { color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; font-size: 10px; }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 12px;
      font-size: 11px; font-weight: 600;
    }
    .badge-info     { background: rgba(88,166,255,.15); color: var(--accent); }
    .badge-warn     { background: rgba(210,153,34,.15);  color: var(--yellow); }
    .badge-error    { background: rgba(248,81,73,.15);   color: var(--red); }
    .badge-critical { background: rgba(248,81,73,.3);    color: #ff7b72; }
    .badge-anomaly  { background: rgba(188,140,255,.15); color: var(--purple); }

    /* ── Filter bar ──────────────────────────────────────────────── */
    .filter-bar {
      display: flex; gap: 10px; align-items: center;
      padding: 8px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .filter-bar input {
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 5px 12px; border-radius: 6px;
      font: var(--fs) var(--font); width: 260px; outline: none;
    }
    .filter-bar input:focus { border-color: var(--accent); }
    .filter-bar select {
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 5px 8px; border-radius: 6px;
      font: var(--fs) var(--font); outline: none; cursor: pointer;
    }
    .filter-bar label { color: var(--muted); font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 4px; }

    /* ── Log container ───────────────────────────────────────────── */
    #log-container {
      flex: 1; overflow-y: auto; padding: 8px 0;
      scroll-behavior: smooth;
    }
    .log-row {
      display: flex; gap: 12px; align-items: baseline;
      padding: 3px 20px; border-left: 3px solid transparent;
      transition: background 0.1s;
    }
    .log-row:hover { background: rgba(255,255,255,.03); }
    .log-row.sev-error    { border-left-color: var(--red); }
    .log-row.sev-critical { border-left-color: #ff7b72; background: rgba(248,81,73,.05); }
    .log-row.sev-warn     { border-left-color: var(--yellow); }
    .log-row.sev-info     { border-left-color: var(--accent); }
    .log-ts   { color: var(--muted); white-space: nowrap; flex-shrink: 0; font-size: 11px; }
    .log-file { color: var(--purple); white-space: nowrap; flex-shrink: 0; font-size: 11px; max-width: 160px; overflow: hidden; text-overflow: ellipsis; }
    .log-sev  { width: 70px; flex-shrink: 0; }
    .log-msg  { flex: 1; word-break: break-all; white-space: pre-wrap; }
    .log-pat  { color: var(--yellow); font-size: 11px; background: rgba(210,153,34,.1); padding: 1px 5px; border-radius: 4px; flex-shrink: 0; }

    /* ── Anomaly panel ────────────────────────────────────────────── */
    #anomaly-panel {
      position: fixed; bottom: 16px; right: 16px; width: 340px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
      display: none; flex-direction: column;
      max-height: 260px;
    }
    #anomaly-panel.visible { display: flex; }
    #anomaly-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 12px; background: rgba(248,81,73,.1); border-bottom: 1px solid var(--border);
    }
    #anomaly-header span { color: var(--red); font-weight: 700; font-size: 12px; }
    #anomaly-header button {
      background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px;
    }
    #anomaly-list { overflow-y: auto; flex: 1; }
    .anomaly-item { padding: 7px 12px; border-bottom: 1px solid var(--border); font-size: 12px; }
    .anomaly-item:last-child { border-bottom: none; }
    .anomaly-item .type { color: var(--purple); font-weight: 600; }
    .anomaly-item .msg  { color: var(--text); margin-top: 2px; }

    /* ── Status bar ──────────────────────────────────────────────── */
    footer {
      display: flex; justify-content: space-between; align-items: center;
      padding: 5px 20px; background: var(--surface);
      border-top: 1px solid var(--border);
      font-size: 11px; color: var(--muted); flex-shrink: 0;
    }
    #auto-scroll { cursor: pointer; }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">logpulse<span> / live dashboard</span></div>
  <div class="header-stats">
    <div class="stat"><span class="stat-val" id="stat-clients">0</span><span class="stat-lbl">clients</span></div>
    <div class="stat"><span class="stat-val" id="stat-lines">0</span><span class="stat-lbl">lines</span></div>
    <div class="stat"><span class="stat-val" id="stat-anomalies">0</span><span class="stat-lbl">anomalies</span></div>
    <div class="stat"><span class="stat-val" id="stat-uptime">–</span><span class="stat-lbl">uptime</span></div>
  </div>
</header>

<!-- Filter bar -->
<div class="filter-bar">
  <input type="text" id="filter-text" placeholder="Filter by text… (regex supported)" />
  <select id="filter-sev">
    <option value="">All severities</option>
    <option value="info">Info</option>
    <option value="warn">Warning</option>
    <option value="error">Error</option>
    <option value="critical">Critical</option>
  </select>
  <label><input type="checkbox" id="filter-auto" checked /> Auto-scroll</label>
  <label><input type="checkbox" id="filter-patterns" checked /> Show patterns only</label>
</div>

<!-- Log output -->
<div id="log-container"></div>

<!-- Anomaly toast panel -->
<div id="anomaly-panel">
  <div id="anomaly-header">
    <span>⚠ Anomaly Detected</span>
    <button onclick="dismissAnomalies()">×</button>
  </div>
  <div id="anomaly-list"></div>
</div>

<!-- Footer -->
<footer>
  <span id="footer-status">Connecting…</span>
  <span>logpulse v1.0.0</span>
</footer>

<script>
(function () {
  'use strict';

  // ── State ────────────────────────────────────────────────────────────
  let lineCount = 0, anomalyCount = 0;
  let autoScroll = true;
  let showPatternsOnly = false;
  let textFilter = '';
  let sevFilter = '';

  const container   = document.getElementById('log-container');
  const anomalyPanel = document.getElementById('anomaly-panel');
  const anomalyList  = document.getElementById('anomaly-list');
  const footerStatus = document.getElementById('footer-status');

  // ── WebSocket ─────────────────────────────────────────────────────────
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${proto}//${location.host}`);

  ws.addEventListener('open', () => {
    footerStatus.textContent = 'Connected – receiving live events';
    footerStatus.style.color = 'var(--green)';
    refreshStatus();
  });

  ws.addEventListener('close', () => {
    footerStatus.textContent = 'Disconnected – refresh to reconnect';
    footerStatus.style.color = 'var(--red)';
  });

  ws.addEventListener('message', (evt) => {
    const data = JSON.parse(evt.data);
    if (data.type === 'snapshot') {
      data.lines.forEach(renderLine);
    } else if (data.type === 'line') {
      renderLine(data);
    } else if (data.type === 'anomaly') {
      renderAnomaly(data);
    }
  });

  // ── Render log line ───────────────────────────────────────────────────
  function renderLine(event) {
    lineCount++;
    document.getElementById('stat-lines').textContent = fmtNum(lineCount);

    if (!passesFilter(event)) return;

    const row = document.createElement('div');
    row.className = `log-row sev-${event.severity || 'info'}`;

    row.innerHTML = `
      <span class="log-ts">${fmtTs(event.timestamp)}</span>
      <span class="log-file" title="${esc(event.filePath || event.file)}">${esc(event.file)}</span>
      <span class="log-sev">${badge(event.severity, event.severity)}</span>
      ${event.pattern ? `<span class="log-pat">${esc(event.pattern)}</span>` : ''}
      <span class="log-msg">${esc(event.line)}</span>
    `;

    container.appendChild(row);
    trimOld(container, 1000);

    if (autoScroll) scrollBottom();
  }

  // ── Render anomaly ────────────────────────────────────────────────────
  function renderAnomaly(event) {
    anomalyCount++;
    document.getElementById('stat-anomalies').textContent = fmtNum(anomalyCount);

    const item = document.createElement('div');
    item.className = 'anomaly-item';
    item.innerHTML = `<span class="type">[${event.type}]</span> ${esc(event.message)}`;
    anomalyList.appendChild(item);
    anomalyPanel.classList.add('visible');

    // Also flash a log line for the anomaly
    renderLine({
      ...event,
      severity: event.severity,
      line: `[ANOMALY ${event.type}] ${event.message}`,
      pattern: event.type,
    });

    trimOld(anomalyList, 50);
  }

  // ── Filters ──────────────────────────────────────────────────────────
  function passesFilter(event) {
    if (sevFilter && event.severity !== sevFilter) return false;
    if (showPatternsOnly && !event.pattern) return false;
    if (textFilter) {
      try {
        if (!new RegExp(textFilter, 'i').test(event.line)) return false;
      } catch (_) {
        if (!event.line.toLowerCase().includes(textFilter.toLowerCase())) return false;
      }
    }
    return true;
  }

  function reapplyFilters() {
    [...container.querySelectorAll('.log-row')].forEach(row => {
      row.style.display = '';
    });
  }

  // ── UI helpers ───────────────────────────────────────────────────────
  function scrollBottom() {
    container.scrollTop = container.scrollHeight;
  }

  function trimOld(parent, maxRows) {
    while (parent.children.length > maxRows) {
      parent.removeChild(parent.firstChild);
    }
  }

  function badge(label, sev) {
    return `<span class="badge badge-${sev}">${label || sev}</span>`;
  }

  function esc(str) {
    return String(str ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function fmtTs(iso) {
    if (!iso) return '';
    try {
      return new Date(iso).toLocaleTimeString('en-US', { hour12: false });
    } catch (_) { return iso; }
  }

  function fmtNum(n) {
    return n > 9999 ? `${(n/1000).toFixed(1)}k` : String(n);
  }

  // ── Anomaly panel ─────────────────────────────────────────────────────
  window.dismissAnomalies = function () {
    anomalyPanel.classList.remove('visible');
    anomalyList.innerHTML = '';
  };

  // ── Status refresh ────────────────────────────────────────────────────
  async function refreshStatus() {
    try {
      const r = await fetch('/api/status');
      const s = await r.json();
      document.getElementById('stat-clients').textContent = s.clients;
      const up = parseFloat(s.uptime);
      document.getElementById('stat-uptime').textContent = fmtDur(up);
    } catch (_) {}
    setTimeout(refreshStatus, 5000);
  }

  function fmtDur(s) {
    if (s < 60)  return `${Math.floor(s)}s`;
    if (s < 3600) return `${Math.floor(s/60)}m`;
    return `${Math.floor(s/3600)}h`;
  }

  // ── Event listeners ───────────────────────────────────────────────────
  document.getElementById('filter-text').addEventListener('input', (e) => {
    textFilter = e.target.value;
    reapplyFilters();
  });

  document.getElementById('filter-sev').addEventListener('change', (e) => {
    sevFilter = e.target.value;
    reapplyFilters();
  });

  document.getElementById('filter-auto').addEventListener('change', (e) => {
    autoScroll = e.target.checked;
    if (autoScroll) scrollBottom();
  });

  document.getElementById('filter-patterns').addEventListener('change', (e) => {
    showPatternsOnly = e.target.checked;
    reapplyFilters();
  });

  refreshStatus();
})();
</script>
</body>
</html>
